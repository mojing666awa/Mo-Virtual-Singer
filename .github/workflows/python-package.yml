name: MVS Python Package CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    # [FIX] 全局强制 UTF-8，防止 Windows 终端编码问题
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    # PyTorch 必须走官方 cu124 索引
    - name: Install PyTorch with CUDA 12.4
      run: |
        pip install torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1 --index-url https://download.pytorch.org/whl/cu124

    # Cython 必须在其他依赖之前单独安装
    - name: Pre-install Cython
      run: pip install Cython==3.0.11 numpy==1.26.4

    - name: Install MVS Core Dependencies
      run: pip install -r requirements.txt

    # [FIX] 验证 MAS 模块：移除 emoji + 验证核心 C 扩展
    - name: Verify Monotonic Align
      run: python -c "from monotonic_align import maximum_path_c; print('[OK] MAS module loaded successfully')"

    # 基础语法与导入检查
    - name: Lint & Import Check
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        python -c "from dataset import NativeMVSDataset; from preprocess import NativeMVSPreprocessor; print('[OK] All core modules importable')"
